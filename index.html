<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fichas de Ruso</title>
    <style>
        :root {
            --bg-color: #0f0f2d;
            --card-bg: #2b3552;
            --text-color: #ffffff;
            --accent-color: #4a5d8a;
            --footer-color: #1e216e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centra todo verticalmente */
            height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
            gap: 20px; /* Espacio entre elementos */
        }

        .header {
            width: 100%;
            max-width: 350px;
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            padding: 5px 10px;
        }

        /* RECUADRO MÁS PEQUEÑO */
        .flashcard-container {
            perspective: 1000px;
            width: 85vw; 
            max-width: 320px;
            aspect-ratio: 1 / 1; /* Ahora es cuadrado para ganar espacio vertical */
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            border-radius: 20px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            background-color: var(--card-bg);
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        .word {
            font-size: 1.8rem; /* Un poco más pequeño para el recuadro cuadrado */
            font-weight: bold;
            word-wrap: break-word;
            max-width: 100%;
        }

        .controls-top {
            position: absolute;
            top: 12px;
            right: 12px;
        }

        .btn-icon {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 8px;
            border-radius: 50%;
            font-size: 1.1rem;
            width: 40px;
            height: 40px;
        }

        .footer-action {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: var(--footer-color);
            text-align: center;
            padding: 8px 0;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            font-size: 0.75rem;
            opacity: 0.9;
        }

        /* NAVEGACIÓN VISIBLE */
        .navigation {
            display: flex;
            gap: 40px;
            margin-top: 10px;
        }

        .nav-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 1.4rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-btn:active {
            transform: scale(0.9);
            background-color: #5a71a8;
        }
    </style>
</head>
<body>

    <div class="header">
        <span>Fichas ⌵</span>
        <span id="counter">1 / 14</span>
    </div>

    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="card">
            <div class="card-face card-front">
                <div class="controls-top">
                    <button class="btn-icon" onclick="speak('ru'); event.stopPropagation();">🔊</button>
                </div>
                <div class="word" id="russianWord">Университет</div>
                <div class="footer-action">Toca para voltear</div>
            </div>
            
            <div class="card-face card-back">
                <div class="controls-top">
                    <button class="btn-icon" onclick="speak('es'); event.stopPropagation();">🔊</button>
                </div>
                <div class="word" id="spanishWord">universidad</div>
            </div>
        </div>
    </div>

    <div class="navigation">
        <button class="nav-btn" onclick="prevCard(event)" id="prevBtn">←</button>
        <button class="nav-btn" onclick="nextCard(event)" id="nextBtn">→</button>
    </div>

    <script>
        const words = [
            { ru: "Университет", es: "universidad" },
            { ru: "Москва", es: "Moscú" },
            { ru: "История", es: "historia" },
            { ru: "Приключение", es: "aventura" },
            { ru: "Россия", es: "Rusia" },
            { ru: "Общежитие", es: "residencia" },
            { ru: "Комната", es: "habitación" },
            { ru: "Дверь", es: "puerta" },
            { ru: "Собака", es: "perro" },
            { ru: "Медведь", es: "oso" },
            { ru: "Кот", es: "gato" },
            { ru: "Африка", es: "África" },
            { ru: "Город", es: "ciudad" },
            { ru: "Сосед", es: "vecino" }
        ];

        let currentIndex = 0;
        const card = document.getElementById('card');
        const russianEl = document.getElementById('russianWord');
        const spanishEl = document.getElementById('spanishWord');
        const counterEl = document.getElementById('counter');

        function updateCard() {
            card.classList.remove('is-flipped');
            setTimeout(() => {
                russianEl.innerText = words[currentIndex].ru;
                spanishEl.innerText = words[currentIndex].es;
                counterEl.innerText = `${currentIndex + 1} / ${words.length}`;
            }, 150);
        }

        function flipCard() {
            card.classList.toggle('is-flipped');
        }

        function nextCard(e) {
            e.stopPropagation();
            if (currentIndex < words.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevCard(e) {
            e.stopPropagation();
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        function speak(lang) {
            const text = lang === 'ru' ? words[currentIndex].ru : words[currentIndex].es;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang === 'ru' ? 'ru-RU' : 'es-ES';
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
